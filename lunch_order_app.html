<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>班級午餐登記</title>
<!-- Tailwind & Phosphor Icons -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root { --bg: #EFE7D8; --panel: #FBF6EC; --panel-2: #F5EEDD; --ink: #2B2A28; --ink-soft: #6B6255; --border: #D8C9A3; --accent: #C23B22; }
  body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding: 20px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  .loading { text-align: center; padding: 50px; }
</style>
</head>
<body>

<div class="wrap" id="wrap">

// ========================================================

try {

  signInAnonymously(auth).then(() => {
    // 這裡會放置原本完整的 UI 渲染邏輯
    document.getElementById('wrap').innerHTML = `
      <div class="text-center p-10">
        <h1 class="text-2xl font-bold mb-4">系統啟動成功</h1>

}
</script>

</html>
